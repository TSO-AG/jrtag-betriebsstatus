name: Generate Betriebsstatus

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override BASE_URL (leave empty for default)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; do not cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine base URL
        id: base-url
        run: |
          INPUT="${{ github.event.inputs.base_url }}"
          if [ -n "$INPUT" ]; then
            echo "url=$INPUT" >> "$GITHUB_OUTPUT"
          else
            # Derive from pages URL: https://<owner>.github.io/<repo>
            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            echo "url=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run generator
        env:
          BASE_URL: ${{ steps.base-url.outputs.url }}
        run: |
          python src/generator/generate.py \
            --output docs \
            --base-url "$BASE_URL"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
